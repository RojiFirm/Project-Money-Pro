<div class="page-head">
  <div>
    <span class="page-eyebrow">Move money between accounts</span>
    <h1>Transfer</h1>
  </div>
</div>

<div class="transfer-grid">
  <div class="card card-pad">
    <h3 style="margin-bottom:14px;font-size:15px;">New transfer</h3>
    <form id="transfer-form">
      <div class="field"><label>From account</label><select name="fromAccountId" id="tf-from"></select></div>
      <div class="field"><label>To account</label><select name="toAccountId" id="tf-to"></select></div>
      <div class="field-row">
        <div class="field"><label>Amount</label><input name="amount" type="number" step="0.01" required></div>
        <div class="field"><label>Date</label><input name="date" type="date" value="" id="tf-date"></div>
      </div>
      <div class="field"><label>Note (optional)</label><input name="note"></div>
      <button type="submit" class="btn btn-primary" style="width:100%">Transfer funds</button>
    </form>
  </div>

  <div class="card">
    <div class="card-head"><h3>Transfer history</h3></div>
    <table class="ledger-table">
      <thead><tr><th>Date</th><th>From</th><th>To</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody id="tf-tbody"></tbody>
    </table>
  </div>
</div>
