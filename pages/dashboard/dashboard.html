<div class="page-head">
  <div>
    <span class="page-eyebrow">Overview</span>
    <h1>Net worth &amp; recent activity</h1>
  </div>
</div>

<div class="hero-card card">
  <span class="hero-label">Total net worth</span>
  <div class="hero-figure tabular" id="dash-networth">—</div>
  <div class="hero-bar" id="dash-bar"></div>
  <div class="hero-legend">
    <span><i class="dot dot-teal"></i>Accounts + Assets</span>
    <span><i class="dot dot-rust"></i>Liabilities</span>
  </div>
</div>

<div class="stat-row">
  <div class="stat-card card card-pad">
    <span class="stat-label">Accounts</span>
    <div class="stat-figure tabular" id="dash-accounts">—</div>
  </div>
  <div class="stat-card card card-pad">
    <span class="stat-label">Assets</span>
    <div class="stat-figure tabular" id="dash-assets">—</div>
  </div>
  <div class="stat-card card card-pad">
    <span class="stat-label">Liabilities</span>
    <div class="stat-figure tabular" id="dash-liabilities">—</div>
  </div>
</div>

<div class="card">
  <div class="card-head">
    <h3>Recent transactions</h3>
    <a href="#/transactions" class="btn btn-ghost btn-sm">View all →</a>
  </div>
  <table class="ledger-table" id="dash-recent-table">
    <thead>
      <tr><th>Date</th><th>Account</th><th>Category</th><th style="text-align:right">Amount</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
