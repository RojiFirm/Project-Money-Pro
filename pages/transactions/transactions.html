<section class="transaction-page">

    <div class="page-header">
        <h1>Transactions</h1>

        <button id="btnNewTransaction">
            + New Transaction
        </button>
    </div>

    <div class="transaction-table">

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Account</th>
                    <th>Amount</th>
                    <th>Tax</th>
                    <th>Net</th>
                    <th>Description</th>
                </tr>

            </thead>

            <tbody id="transactionBody">

            </tbody>

        </table>

    </div>

</section>

<!-- Modal -->

<div id="transactionModal" class="modal hidden">

    <div class="modal-content">

        <h2>Quick Transaction</h2>

        <form id="transactionForm">

            <label>Date</label>
            <input type="date" id="date">

            <label>Type</label>
            <select id="type">
                <option>Income</option>
                <option>Expense</option>
            </select>

            <label>Category</label>
            <select id="category"></select>

            <label>Account</label>
            <select id="account"></select>

            <label>Amount</label>
            <input type="number" id="amount">

            <label>Tax Type</label>
            <select id="taxType"></select>

            <label>Additional Tax</label>
            <select id="additionalTax"></select>

            <label>Description</label>
            <textarea id="description"></textarea>

            <hr>

            <p>Tax Amount :
                <span id="taxAmount">₱0.00</span>
            </p>

            <p>Additional Tax :
                <span id="additionalTaxAmount">₱0.00</span>
            </p>

            <p>Net Amount :
                <span id="netAmount">₱0.00</span>
            </p>

            <button type="submit">
                Save Transaction
            </button>

        </form>

    </div>

</div>
